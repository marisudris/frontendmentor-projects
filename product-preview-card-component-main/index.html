<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <header class="visually-hidden">
      <h1>Product Preview Card Component</h1>
    </header>

    <main class="main">
      <article class="product">
        <picture class="product-image">
          <source
            media="(min-width: 700px)"
            srcset="./images/image-product-desktop.jpg"
          />
          <img
            class="product-image"
            src="./images/image-product-mobile.jpg"
            alt=""
          />
        </picture>
        <span class="product-category">Perfume</span>
        <h2 class="product-title">Gabrielle Essence Eau De Parfum</h2>
        <p class="product-description">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <span class="visually-hidden">Current price:</span>
        <ins class="new-price" title="Sale price 149 dollars and 99 cents">
          <span aria-hidden="true">$149.99</span>
        </ins>
        <span class="visually-hidden">Original price:</span>
        <del
          class="old-price"
          title="Original price 169 dollars and 99 cents"
        >
          <span aria-hidden="true">$169.99</span>
        </del>
        <button type="button" class="button"><img src="./images/icon-cart.svg" alt="" aria-hidden="true">Add to Cart</button>
      </article>
    </main>

    <footer class="visually-hidden">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
